name: Alxcer Guard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
    paths:
      - "bot/src/**"
      - "bot/package.json"
      - "bot/config.json"
      - ".github/workflows/alxcer-guard.yml"

concurrency:
  group: alxcer-guard
  cancel-in-progress: true

permissions:
  contents: write
  models: read

jobs:
  run-bot:
    name: Run Discord bot
    runs-on: ubuntu-latest
    timeout-minutes: 350
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install ffmpeg (required by @discordjs/voice for MP3 playback)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -n 1

      - name: Cache bot dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: bot/node_modules
          key: bot-deps-${{ runner.os }}-node22-${{ hashFiles('bot/package.json') }}-v6
          restore-keys: |
            bot-deps-${{ runner.os }}-node22-

      - name: Cache YOLO model
        uses: actions/cache@v4
        with:
          path: bot/.cache/models
          key: yolov5n-onnx-v6.0-fp32

      - name: Cache Sarabun Thai font
        uses: actions/cache@v4
        with:
          path: bot/.cache/fonts
          key: sarabun-bold-v1

      - name: Install bot dependencies
        run: npm install --no-audit --no-fund

      - name: Run Alxcer Guard
        env:
          DISCORD_PERSONAL_ACCESS_TOKEN: ${{ secrets.DISCORD_PERSONAL_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          DEEPGRAM_MODEL: nova-3
          DEEPGRAM_LANGUAGE: th
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/index.js
